.container {
  background-position: top;
  background-size: cover;
  background-repeat: no-repeat;
  height: 100vh;
  width: 100vw;
}
.wheel-logo-bonus__logo {
  margin: 0 auto;
}
.wheel-logo-bonus__logo-image {
  display: block;
  height: 100%;
  width: 100%;
  object-fit: cover;
}
.wheel-logo-bonus__bonus {
  position: fixed;
  transform: translateX(-50%);
  z-index: 2;
}
.wheel-logo-bonus__bonus-image {
  display: block;
  height: 100%;
  width: 100%;
  object-fit: cover;
}
.wheel {
  position: fixed;
  transform: translateX(-50%);
  left: 50%;
  border-radius: 50%;
  background-position: 50%;
  background-repeat: no-repeat;
  z-index: 2;
}
.wheel,
.wheel__container {
  display: flex;
  justify-content: center;
  align-items: center;
}
.wheel__container {
  position: relative;
  height: 100%;
  width: 100%;
}
.wheel__pointer {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  display: block;
  z-index: 1;
}
.wheel__button {
  z-index: 1;
  text-transform: uppercase;
  cursor: pointer;
}
.wheel__button,
.wheel__button-bcg {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}
.wheel__button-bcg {
  display: block;
  height: 100%;
  width: 100%;
  background-position: 50%;
  background-repeat: no-repeat;
  background-size: cover;
}
.wheel__button-text {
  width: 100%;
  display: block;
  position: relative;
  z-index: 1;
  font-weight: 700;
  text-align: center;
}
.wheel__spinner {
  border-radius: 50%;
}
.wheel__spinner--animate {
  animation: wheelMove 2s ease-out infinite;
}
.wheel__inside {
  background-position: 50%;
  background-size: cover;
  background-repeat: no-repeat;
  border-radius: 50%;
  position: relative;
  height: 100%;
  width: 100%;
  transition: transform 2.5s ease-in-out;
}
.wheel__inside--odd-white > :nth-child(odd) {
  color: #fff;
}
.wheel__text {
  text-transform: uppercase;
  position: absolute;
  text-align: center;
  padding-top: 25px;
  transform-origin: bottom center;
  top: 0;
  left: 0;
  right: 0;
  margin: auto;
  height: 50%;
  font-weight: 700;
}
.wheel__text--rotated > * {
  transform: rotate(-90deg);
}
.wheel__text:nth-child(2) {
  transform: rotate(45deg);
}
.wheel__text:nth-child(3) {
  transform: rotate(90deg);
}
.wheel__text:nth-child(4) {
  transform: rotate(135deg);
}
.wheel__text:nth-child(5) {
  transform: rotate(180deg);
}
.wheel__text:nth-child(6) {
  transform: rotate(225deg);
}
.wheel__text:nth-child(7) {
  transform: rotate(270deg);
}
.wheel__text:nth-child(8) {
  transform: rotate(315deg);
}
@keyframes wheelMove {
  0% {
    transform: rotate(-6deg);
  }
  50% {
    transform: rotate(6deg);
  }
  to {
    transform: rotate(-6deg);
  }
}
.popup {
  position: fixed;
  top: 0;
  left: 100%;
  height: 100%;
  width: 100%;
  /* background-color: #fff; */
  background-color: rgba(0, 23, 44, 0.8);
  z-index: 4;
  overflow: hidden;
}
.popup--show {
  left: 0;
}
.popup__logo {
  margin: 0 auto;
  position: relative;
  z-index: 1;
}
.popup__logo-image {
  display: block;
  height: 100%;
  width: 100%;
  object-fit: cover;
}
.popup__content {
  height: 100%;
  width: 100%;
  position: relative;
}
.popup__failure {
  background-position: 50%;
  background-size: cover;
  background-repeat: no-repeat;
  width: 100%;
  position: absolute;
  top: 0;
  left: 0;
  flex-direction: column;
  align-items: center;
  text-align: center;
  text-transform: uppercase;
  display: flex;
}
.popup__failure-title {
  color: #fff;
  font-weight: 700;
  max-width: 200px;
}
.popup__failure-text {
  position: relative;
  max-width: 250px;
  line-height: 1.1;
}
.popup__failure-button {
  position: relative;
  border: none;
  font-weight: 700;
  border-radius: 50px;
  background: linear-gradient(180deg, #ffe600, #ffb800);
  text-shadow: 0 1px 0 #ffe249;
  box-shadow: inset 0 -2px 0 #f90;
  cursor: pointer;
}
.popup__failure-button:hover {
  background: linear-gradient(180deg, #ffb800, #ffe600);
  box-shadow: inset 0 -5px 0 #f90;
}
@font-face {

.popup__success {
  background-position: 50%;

@keyframes characterLeftSlide {
  0% {
    transform: translateX(0);
  }
  50% {
    transform: translateX(-100px);
  }
  to {
    transform: translateX(0);
  }
}
@keyframes wheelBlinking {
  0% {
    opacity: 0;
  }
  50% {
    opacity: 1;
  }
  to {
    opacity: 0;
  }
}
@keyframes slideLeftText {
  0% {
    left: 50%;
  }

  to {

  }
}
@keyframes slideRightText {

  50% {

  }
}
@keyframes wheelMove {
  0% {
    transform: rotate(-6deg);
  }
  50% {

  }
  to {

  }
}

<main class="container">

<button type="button" id="spinAgain" class="popup__failure-button" data-testid="wheel-popup-failure-button">

<!-- POPUP 2 -->
<div class="popup" id="pop2" data-testid="wheel-popup">
<div class="popup__content">
<div class="popup__success" data-testid="wheel-popup-success">
<h2 class="popup__success-title"></h2>
<div class="popup__success-texts">
<h3 class="popup__success-main-text">

<source type="image/avif" />
<img class="wheel__pointer" src="images/wheel-triangle.2bf07755.png" alt="wheel-pointer" />
</picture>
<button class="wheel__button" id="spinButton" data-testid="wheel-button">
<span class="wheel__button-bcg"></span>
<span class="wheel__button-text"></span>
</button>
<div class="wheel__spinner wheel__spinner--animate" data-testid="wheel-spinner">
<div class="wheel__inside" id="wheel" style="transform: rotate(0deg)"></div>
</div>

<script>
const wheel = document.getElementById("wheel")
const spinButton = document.getElementById("spinButton")
const pop1 = document.getElementById("pop1")
const pop2 = document.getElementById("pop2")
const spinAgain = document.getElementById("spinAgain")
let spinning = false

const numberOfSegments = 6 // Adjust based on your image segments
const segmentAngle = 360 / numberOfSegments

function spinWheel() {
  if (spinning) return
  spinning = true

  // const randomDegree = Math.floor(Math.random() * 360) + 3600; // Spin at least 10 full circles
  const randomDegree = 1 + 2470
  wheel.style.transform = `rotate(${randomDegree}deg)`

  setTimeout(() => {
    const actualDegree = randomDegree % 360
    const segmentIndex = Math.floor((360 - actualDegree) / segmentAngle)
    const prize = `Prize ${segmentIndex + 1}` // Customize based on actual prizes
    pop1.classList.add("popup--show")
    spinning = false
  }, 4000)
}
function spinWheelAgain() {
  if (spinning) return
  spinning = true
  pop1.classList.remove("popup--show")
  // const randomDegree = Math.floor(Math.random() * 360) + 3600; // Spin at least 10 full circles
  const randomDegree = 1 + 4400
  wheel.style.transform = `rotate(${randomDegree}deg)`

  setTimeout(() => {
    const actualDegree = randomDegree % 360
    const segmentIndex = Math.floor((360 - actualDegree) / segmentAngle)
    const prize = `Prize ${segmentIndex + 1}` // Customize based on actual prizes
    pop2.classList.add("popup--show")
    spinning = false
  }, 4000)
}

spinButton.addEventListener("click", spinWheel)
spinAgain.addEventListener("click", spinWheelAgain)

</script>
